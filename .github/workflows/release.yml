name: Release

on:
  push:
    tags:
      - "v*.*.*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libjpeg-turbo8-dev \
            libpng-dev \
            libwebp-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cp build/ghostim ghostim-linux-x86_64

      - uses: actions/upload-artifact@v4
        with:
          name: ghostim-linux-x86_64
          path: ghostim-linux-x86_64

  # ── macOS x86_64 (Intel runner — native libs) ──────────────────────────────
  macos-x86:
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install jpeg-turbo libpng webp

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_PREFIX_PATH=/usr/local
          cmake --build build

      - uses: actions/upload-artifact@v4
        with:
          name: ghostim-macos-x86_64
          path: build/ghostim

  # ── macOS arm64 (Apple Silicon runner — native libs) ───────────────────────
  macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install jpeg-turbo libpng webp

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH=/opt/homebrew
          cmake --build build

      - uses: actions/upload-artifact@v4
        with:
          name: ghostim-macos-arm64
          path: build/ghostim

  # ── macOS universal (merge x86_64 + arm64) ────────────────────────────────
  macos-universal:
    needs: [macos-x86, macos-arm]
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ghostim-macos-x86_64
          path: bin-x86/

      - uses: actions/download-artifact@v4
        with:
          name: ghostim-macos-arm64
          path: bin-arm/

      - name: Merge universal binary
        run: |
          lipo -create bin-x86/ghostim bin-arm/ghostim \
            -output ghostim-macos-universal

      - uses: actions/upload-artifact@v4
        with:
          name: ghostim-macos-universal
          path: ghostim-macos-universal

  # ── Windows x86-64 (MSYS2 pre-built packages) ─────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libwebp

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build
          cp build/ghostim.exe ghostim-windows-x86_64.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ghostim-windows-x86_64.exe
          path: ghostim-windows-x86_64.exe

  # ── Publish Release ────────────────────────────────────────────────────────
  release:
    needs: [linux, macos-universal, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ghostim-linux-x86_64
            dist/ghostim-macos-universal
            dist/ghostim-windows-x86_64.exe
