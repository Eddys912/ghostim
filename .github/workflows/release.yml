name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Linux ─────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libjpeg-turbo8-dev libpng-dev libwebp-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cp build/ghostim ghostim-linux-x86_64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-linux-x86_64
          path: ghostim-linux-x86_64

  # ── macOS (universal: Intel + Apple Silicon) ──────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install jpeg-turbo libpng webp pkg-config

      - name: Build x86_64
        run: |
          cmake -B build-x86 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build-x86

      - name: Build arm64
        run: |
          cmake -B build-arm -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build-arm

      - name: Merge universal binary
        run: |
          lipo -create build-x86/ghostim build-arm/ghostim \
            -output ghostim-macos-universal

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-macos-universal
          path: ghostim-macos-universal

  # ── Windows x86-64 (MinGW + vcpkg) ───────────────────────────────────────
  windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          choco install mingw -y --no-progress
          echo "C:\ProgramData\mingw64\mingw64\bin" | `
            Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install pkg-config
        run: choco install pkgconfiglite -y --no-progress

      - name: Install libs via vcpkg
        run: |
          $root = $env:VCPKG_INSTALLATION_ROOT
          & "$root\vcpkg" install libjpeg-turbo libpng libwebp `
            --triplet x64-mingw-static
          echo "VCPKG_ROOT=$root" >> $env:GITHUB_ENV

          # Export pkg-config .pc files so CMake/pkg-config can find the libs
          $pc = "$root\installed\x64-mingw-static\lib\pkgconfig"
          echo "PKG_CONFIG_PATH=$pc" >> $env:GITHUB_ENV

      - name: Build
        run: |
          gcc --version
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -G "MinGW Makefiles" `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" `
            -DVCPKG_TARGET_TRIPLET=x64-mingw-static
          cmake --build build

      - name: Rename binary
        run: cp build\ghostim.exe ghostim-windows-x86_64.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-windows-x86_64.exe
          path: ghostim-windows-x86_64.exe

  # ── Publish Release ───────────────────────────────────────────────────────
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ghostim-linux-x86_64
            dist/ghostim-macos-universal
            dist/ghostim-windows-x86_64.exe
