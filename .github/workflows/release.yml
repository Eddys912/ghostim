name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Linux ──────────────────────────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libjpeg-turbo8-dev \
            libpng-dev \
            libwebp-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cp build/ghostim ghostim-linux-x86_64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-linux-x86_64
          path: ghostim-linux-x86_64

  # ── macOS (universal: Intel + Apple Silicon) ───────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install jpeg-turbo libpng webp

      - name: Build x86_64
        env:
          # Homebrew on Apple Silicon is in /opt/homebrew, Intel in /usr/local
          # CMAKE_PREFIX_PATH tells find_package where to search
          CMAKE_PREFIX_PATH: /opt/homebrew:/usr/local
        run: |
          cmake -B build-x86 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64 \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          cmake --build build-x86

      - name: Build arm64
        env:
          CMAKE_PREFIX_PATH: /opt/homebrew:/usr/local
        run: |
          cmake -B build-arm -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64 \
            -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          cmake --build build-arm

      - name: Merge universal binary
        run: |
          lipo -create build-x86/ghostim build-arm/ghostim \
            -output ghostim-macos-universal

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-macos-universal
          path: ghostim-macos-universal

  # ── Windows x86-64 (MSYS2 + pre-built MinGW packages) ─────────────────────
  # MSYS2 provides pre-compiled packages — no compilation from source,
  # build time is under 90 seconds total.
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: false
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-libjpeg-turbo
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-libwebp

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release -G Ninja
          cmake --build build
          cp build/ghostim.exe ghostim-windows-x86_64.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-windows-x86_64.exe
          path: ghostim-windows-x86_64.exe

  # ── Publish Release ────────────────────────────────────────────────────────
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ghostim-linux-x86_64
            dist/ghostim-macos-universal
            dist/ghostim-windows-x86_64.exe
