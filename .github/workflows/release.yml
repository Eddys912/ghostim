name: Release

# Runs when you push a version tag: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Linux (Ubuntu 22.04 LTS) ──────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Rename binary
        run: cp build/ghostim ghostim-linux-x86_64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-linux-x86_64
          path: ghostim-linux-x86_64

  # ── macOS (universal: Intel + Apple Silicon) ──────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64
        run: |
          cmake -B build-x86 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build-x86

      - name: Build arm64
        run: |
          cmake -B build-arm -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build-arm

      - name: Merge universal binary
        run: |
          lipo -create build-x86/ghostim build-arm/ghostim \
            -output ghostim-macos-universal

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-macos-universal
          path: ghostim-macos-universal

  # ── Windows x86-64 (MinGW — compatible with pure C99) ────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-cmake

      - name: Build
        shell: msys2 {0}
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -G "MinGW Makefiles" \
            -DCMAKE_C_COMPILER=gcc
          cmake --build build

      - name: Rename binary
        shell: msys2 {0}
        run: cp build/ghostim.exe ghostim-windows-x86_64.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-windows-x86_64.exe
          path: ghostim-windows-x86_64.exe

  # ── Create GitHub Release with all 3 binaries ────────────────────────────
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ghostim-linux-x86_64
            dist/ghostim-macos-universal
            dist/ghostim-windows-x86_64.exe
