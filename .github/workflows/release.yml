name: Release

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  # ── Linux (Ubuntu 22.04 LTS) ──────────────────────────────────────────────
  linux:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build
          cp build/ghostim ghostim-linux-x86_64

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-linux-x86_64
          path: ghostim-linux-x86_64

  # ── macOS (universal: Intel + Apple Silicon) ──────────────────────────────
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build x86_64
        run: |
          cmake -B build-x86 -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=x86_64
          cmake --build build-x86

      - name: Build arm64
        run: |
          cmake -B build-arm -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES=arm64
          cmake --build build-arm

      - name: Merge universal binary
        run: |
          lipo -create build-x86/ghostim build-arm/ghostim \
            -output ghostim-macos-universal

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-macos-universal
          path: ghostim-macos-universal

  # ── Windows x86-64 ────────────────────────────────────────────────────────
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW via Chocolatey
        run: choco install mingw -y

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release `
            -G "MinGW Makefiles" `
            -DCMAKE_C_COMPILER="C:/ProgramData/mingw64/bin/gcc.exe" `
            -DCMAKE_MAKE_PROGRAM="C:/ProgramData/mingw64/bin/mingw32-make.exe"
          cmake --build build

      - name: Rename binary
        run: cp build\ghostim.exe ghostim-windows-x86_64.exe

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ghostim-windows-x86_64.exe
          path: ghostim-windows-x86_64.exe

  # ── Publish Release ───────────────────────────────────────────────────────
  release:
    needs: [linux, macos, windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all binaries
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List dist
        run: ls -la dist/

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/ghostim-linux-x86_64
            dist/ghostim-macos-universal
            dist/ghostim-windows-x86_64.exe
